name: android-release-apk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle --no-daemon :app:assembleRelease

      - name: Rename APK with Beijing build time
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TIME="$(TZ=Asia/Shanghai date +%Y-%m-%d-%H-%M-%S)"
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          SRC="$(ls app/build/outputs/apk/release/*.apk | head -n 1)"
          BASENAME="$(basename "$SRC" .apk)"
          DEST="app/build/outputs/apk/release/${BASENAME}-${BUILD_TIME}.apk"
          mv "$SRC" "$DEST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.BUILD_TIME }}
          path: app/build/outputs/apk/release/*.apk

